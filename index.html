```html
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>익명 채팅방</title>

<style>
body {
    font-family: sans-serif;
    background: #f5f5f5;
    text-align: center;
}

h1 {
    margin-top: 20px;
}

#chat {
    list-style: none;
    padding: 0;
    max-width: 400px;
    margin: 20px auto;
}

li {
    background: white;
    margin: 5px;
    padding: 10px;
    border-radius: 10px;
    text-align: left;
}

input {
    padding: 10px;
    width: 250px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button {
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #4CAF50;
    color: white;
}
</style>

</head>
<body>

<h1>💬 익명 채팅방</h1>

<input id="msg" placeholder="메시지 입력">
<button onclick="send()">보내기</button>

<ul id="chat"></ul>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
// 🔥 여기에 네 Firebase 코드 넣기
const firebaseConfig = {
  apiKey: "여기에",
  authDomain: "여기에",
  databaseURL: "여기에",
  projectId: "여기에",
  storageBucket: "여기에",
  messagingSenderId: "여기에",
  appId: "여기에"
};

// 초기화
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 메시지 보내기
function send() {
    let text = document.getElementById("msg").value;

    if (text.trim() === "") return;

    db.ref("chat").push({
        message: text
    });

    document.getElementById("msg").value = "";
}

// 엔터로 전송
document.getElementById("msg").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        send();
    }
});

// 실시간 채팅 표시
db.ref("chat").on("child_added", function(data) {
    let msg = data.val().message;

    let li = document.createElement("li");
    li.innerText = msg;

    document.getElementById("chat").appendChild(li);

    // 자동 스크롤
    window.scrollTo(0, document.body.scrollHeight);
});
</script>

</body>
</html>
```
